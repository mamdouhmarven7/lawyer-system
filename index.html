<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مكتب المستشارين - نظام إدارة مكتب المحاماة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "\f0e3";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 35vw;
            color: rgba(203, 213, 225, 0.15);
            pointer-events: none;
            z-index: 0;
        }
        .app-container {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 40;
            overflow-y: auto;
            box-shadow: -4px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }
        .sidebar-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #facc15;
            margin-bottom: 8px;
        }
        .lawyer-name { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 3px; }
        .lawyer-name-small { font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; }
        .consultant-text {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px solid #334155;
        }
        .nav-menu { padding: 20px 0; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            margin: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .nav-item i { width: 24px; font-size: 1.2rem; }
        .nav-item:hover { background-color: #334155; color: white; }
        .nav-item.active { background-color: #facc15; color: #0f172a; font-weight: 700; }
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 24px;
            min-height: 100vh;
            position: relative;
            z-index: 2;
            background: rgba(248, 250, 252, 0.85);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px 24px;
            border-radius: 24px;
            margin-bottom: 24px;
        }
        .page-title { font-size: 1.6rem; font-weight: 700; color: #0f172a; }
        .notif-badge { position: relative; cursor: pointer; }
        .badge-count {
            position: absolute;
            top: -8px;
            left: -8px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 24px;
            border-right: 6px solid #facc15;
        }
        .stat-card h3 { font-size: 1rem; color: #475569; margin-bottom: 8px; }
        .stat-number { font-size: 2.2rem; font-weight: 800; color: #0f172a; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn {
            background-color: #facc15;
            color: #0f172a;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #334155;
        }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #22c55e; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: right; padding: 12px 8px; border-bottom: 1px solid #e2e8f0; }
        th { font-weight: 700; color: #475569; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
        }
        textarea { resize: vertical; min-height: 80px; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        .modal-container {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            text-align: right;
        }
        .modal-container h3 {
            margin-bottom: 20px;
            color: #0f172a;
            padding-bottom: 10px;
            border-bottom: 2px solid #facc15;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; border: none; font-family: 'Cairo', sans-serif; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(100%); position: fixed; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .menu-toggle { display: block; }
            .modal-container { width: 95%; max-height: 85vh; padding: 15px; }
        }
        .menu-toggle { display: none; background: #0f172a; color: white; border: none; font-size: 1.5rem; cursor: pointer; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
        .case-row { cursor: pointer; transition: background 0.2s; }
        .case-row:hover { background: #f1f5f9; }
        .expanded-row td { padding: 0; }
        .expanded-content { padding: 20px; background: #f8fafc; }
        .doc-item, .session-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .session-item { background: #fef9c3; border-right: 4px solid #facc15; }
        .session-item.urgent { background: #fee2e2; border-right-color: #ef4444; }
        .doc-item { background: #f1f5f9; }
        .flex-start { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .sessions-section, .subject-section { margin-top: 20px; border-top: 2px solid #e2e8f0; padding-top: 20px; }
        .badge { background: #facc15; color: #0f172a; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-warning { background: #ef4444; color: white; }
        .subject-content { background: #f1f5f9; padding: 15px; border-radius: 16px; margin-top: 10px; white-space: pre-wrap; line-height: 1.6; }
        .last-session-badge { background: #22c55e; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .delegation-details { background: #fef9c3; padding: 10px; border-radius: 12px; margin-top: 8px; font-size: 12px; }
        .delegation-details span { color: #f97316; font-weight: bold; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-gavel"></i> مكتب المستشارين</h2>
            <div class="lawyer-name">ممدوح زهوي</div>
            <div class="lawyer-name-small">أندرو ممدوح زهوي</div>
            <div class="consultant-text">مستشارون قانونيون</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> <span>لوحة التحكم</span></div>
            <div class="nav-item" data-tab="clients"><i class="fas fa-users"></i> <span>الموكلون</span></div>
            <div class="nav-item" data-tab="cases"><i class="fas fa-balance-scale"></i> <span>القضايا</span></div>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <h1 class="page-title" id="pageTitle">لوحة التحكم</h1>
            <div class="notif-badge" id="notifIcon"><i class="fas fa-bell fa-lg"></i><span class="badge-count" id="notifCount">0</span></div>
        </div>
        <div id="dashboardTab" class="tab-content">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="card"><h3>📅 الجلسات القادمة</h3><div id="upcomingSessions"></div></div>
        </div>
        <div id="clientsTab" class="tab-content" style="display:none;">
            <div class="card">
                <div class="card-header"><h3>قائمة الموكلين</h3><button class="btn" id="addClientBtn"><i class="fas fa-plus"></i> إضافة موكل</button></div>
                <div style="overflow-x:auto;"><table id="clientsTable"><thead><tr><th>الاسم</th><th>النوع</th><th>الهاتف</th><th>الرقم الوطني</th><th>بيانات التوكيل</th><th>عدد القضايا</th><th>الإجراءات</th></tr></thead><tbody></tbody></table></div>
            </div>
        </div>
        <div id="casesTab" class="tab-content" style="display:none;">
            <div class="card">
                <div class="card-header"><h3>القضايا</h3><button class="btn" id="addCaseBtn"><i class="fas fa-plus"></i> قضية جديدة</button></div>
                <div style="overflow-x:auto;"><table id="casesTable"><thead><tr><th style="width:30px"></th><th>رقم القضية</th><th>المحكمة/الدائرة</th><th>الموكل</th><th>الخصم</th><th>الموضوع</th><th>الإجراءات</th></tr></thead><tbody></tbody></table></div>
            </div>
        </div>
    </div>
</div>
<script>
    let clients = JSON.parse(localStorage.getItem('clients')) || [];
    let cases = JSON.parse(localStorage.getItem('cases')) || [];
    let documents = JSON.parse(localStorage.getItem('documents')) || [];
    let notifications = JSON.parse(localStorage.getItem('notifications')) || [];
    let expandedCase = null;

    function saveAll() {
        localStorage.setItem('clients', JSON.stringify(clients));
        localStorage.setItem('cases', JSON.stringify(cases));
        localStorage.setItem('documents', JSON.stringify(documents));
        localStorage.setItem('notifications', JSON.stringify(notifications));
        updateStatsAndNotifs();
    }

    function updateStatsAndNotifs() {
        document.getElementById('notifCount').innerText = notifications.filter(n => !n.read).length;
        renderDashboard();
    }

    function addNotification(msg) {
        notifications.unshift({ id: Date.now(), text: msg, read: false, date: new Date().toLocaleString() });
        if(notifications.length > 100) notifications.pop();
        saveAll();
    }

    function renderDashboard() {
        const totalClients = clients.length;
        const totalCases = cases.length;
        const totalDocs = documents.length;
        let allSessions = [];
        cases.forEach(c => {
            if(c.sessions && c.sessions.length > 0) {
                c.sessions.forEach(session => {
                    if(session.date && new Date(session.date) > new Date()) {
                        allSessions.push({
                            caseNumber: c.caseNumber,
                            clientName: clients.find(cl=>cl.id == c.clientId)?.name || 'غير معروف',
                            sessionDate: session.date,
                            sessionNotes: session.notes
                        });
                    }
                });
            }
        });
        allSessions.sort((a,b) => new Date(a.sessionDate) - new Date(b.sessionDate));
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h3>إجمالي الموكلين</h3><div class="stat-number">${totalClients}</div></div>
            <div class="stat-card"><h3>القضايا</h3><div class="stat-number">${totalCases}</div></div>
            <div class="stat-card"><h3>المستندات</h3><div class="stat-number">${totalDocs}</div></div>
            <div class="stat-card"><h3>الجلسات القادمة</h3><div class="stat-number">${allSessions.length}</div></div>
        `;
        let upcomingHtml = '<div style="display:flex; flex-direction:column; gap:10px;">';
        allSessions.slice(0,10).forEach(s => {
            upcomingHtml += `<div style="padding:12px; background:#fef9c3; border-radius:16px; border-right:4px solid #facc15;"><div><strong>⚖️ ${s.caseNumber}</strong> - ${s.clientName}</div><div class="flex-between" style="margin-top:8px;"><span><i class="fas fa-calendar-alt"></i> ${new Date(s.sessionDate).toLocaleDateString('ar-EG')}</span><span class="badge">جلسة قادمة</span></div>${s.sessionNotes ? `<div style="font-size:12px; color:#64748b;">📝 ${s.sessionNotes}</div>` : ''}</div>`;
        });
        upcomingHtml += '</div>';
        if(allSessions.length === 0) upcomingHtml = '<p>لا توجد جلسات قادمة</p>';
        document.getElementById('upcomingSessions').innerHTML = upcomingHtml;
    }

    function renderClients() {
        let tbody = document.querySelector('#clientsTable tbody');
        tbody.innerHTML = '';
        clients.forEach(c => {
            let caseCount = cases.filter(cas => cas.clientId == c.id).length;
            tbody.innerHTML += `<tr><td>${c.name}</td><td>${c.type === 'company' ? 'شركة' : 'فرد'}</td><td>${c.phone || '--'}</td><td>${c.idNumber || '--'}</td><td><div class="delegation-details">${c.delegationNumber ? `<span>📜 رقم التوكيل:</span> ${c.delegationNumber}<br><span>📅 التاريخ:</span> ${c.delegationDate || '--'}<br><span>🏛️ جهة التوثيق:</span> ${c.delegationAuthority || '--'}</div>` : 'لا توجد بيانات توكيل'}<button class="btn-outline btn-sm" onclick="editDelegation(${c.id})" style="margin-top:5px;"><i class="fas fa-file-signature"></i> تعديل التوكيل</button></td><td>${caseCount}</td><td class="action-buttons"><button class="btn-outline btn-sm" onclick="editClient(${c.id})" style="background:#facc15;"><i class="fas fa-edit"></i> تعديل</button><button class="btn-outline btn-sm" onclick="deleteClient(${c.id})" style="background:#ef4444; color:white;"><i class="fas fa-trash"></i> حذف</button></td></tr>`;
        });
    }

    window.editDelegation = (clientId) => {
        let client = clients.find(c => c.id === clientId);
        if(!client) return;
        let modalHtml = `<div id="delegationModal" class="modal-overlay"><div class="modal-container"><h3><i class="fas fa-file-signature"></i> بيانات التوكيل - ${client.name}</h3><label>📜 رقم التوكيل:</label><input type="text" id="delegationNumber" value="${client.delegationNumber || ''}"><label>📅 تاريخ التوكيل:</label><input type="date" id="delegationDate" value="${client.delegationDate || ''}"><label>🏛️ جهة التوثيق:</label><input type="text" id="delegationAuthority" value="${client.delegationAuthority || ''}"><label>📝 ملاحظات:</label><textarea id="delegationNotes" rows="3">${client.delegationNotes || ''}</textarea><div class="modal-buttons"><button id="saveDelegationBtn" style="background:#22c55e; color:white;">💾 حفظ</button><button id="closeDelegationBtn" style="background:#e2e8f0;">❌ إلغاء</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('saveDelegationBtn').onclick = () => {
            client.delegationNumber = document.getElementById('delegationNumber').value;
            client.delegationDate = document.getElementById('delegationDate').value;
            client.delegationAuthority = document.getElementById('delegationAuthority').value;
            client.delegationNotes = document.getElementById('delegationNotes').value;
            saveAll();
            renderClients();
            addNotification(`تم تحديث التوكيل للموكل ${client.name}`);
            alert("✅ تم حفظ بيانات التوكيل!");
            document.getElementById('delegationModal').remove();
        };
        document.getElementById('closeDelegationBtn').onclick = () => document.getElementById('delegationModal').remove();
    };

    window.editClient = (clientId) => {
        let client = clients.find(c => c.id === clientId);
        if(!client) return;
        let modalHtml = `<div id="editClientModal" class="modal-overlay"><div class="modal-container"><h3>✏️ تعديل بيانات الموكل</h3><label>الاسم:</label><input type="text" id="editClientName" value="${client.name}"><label>النوع:</label><select id="editClientType"><option value="individual" ${client.type === 'individual' ? 'selected' : ''}>فرد</option><option value="company" ${client.type === 'company' ? 'selected' : ''}>شركة</option></select><label>رقم الهاتف:</label><input type="text" id="editClientPhone" value="${client.phone || ''}"><label>الرقم الوطني:</label><input type="text" id="editClientIdNumber" value="${client.idNumber || ''}"><div class="modal-buttons"><button id="modalSaveBtn" style="background:#22c55e; color:white;">✅ حفظ</button><button id="modalCancelBtn" style="background:#e2e8f0;">❌ إلغاء</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('modalSaveBtn').onclick = () => {
            let newName = document.getElementById('editClientName').value.trim();
            if(!newName) { alert("الاسم مطلوب"); return; }
            client.name = newName;
            client.type = document.getElementById('editClientType').value;
            client.phone = document.getElementById('editClientPhone').value.trim();
            client.idNumber = document.getElementById('editClientIdNumber').value.trim();
            saveAll();
            renderClients();
            renderCases();
            addNotification(`تم تعديل الموكل: ${newName}`);
            alert("✅ تم التعديل!");
            document.getElementById('editClientModal').remove();
        };
        document.getElementById('modalCancelBtn').onclick = () => document.getElementById('editClientModal').remove();
    };

    function addSession(caseId) {
        let caseObj = cases.find(c => c.id === caseId);
        if(!caseObj) return;
        let modalHtml = `<div id="addSessionModal" class="modal-overlay"><div class="modal-container"><h3><i class="fas fa-calendar-plus"></i> إضافة جلسة - ${caseObj.caseNumber}</h3><label>📅 تاريخ الجلسة:</label><input type="date" id="sessionDate"><label>📝 ملاحظات:</label><textarea id="sessionNotes" rows="3" placeholder="مثلاً: جلسة المرافعة..."></textarea><div class="modal-buttons"><button id="saveSessionBtn" style="background:#22c55e; color:white;">✅ إضافة</button><button id="cancelSessionBtn" style="background:#e2e8f0;">❌ إلغاء</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('saveSessionBtn').onclick = () => {
            let sessionDate = document.getElementById('sessionDate').value;
            if(!sessionDate) { alert("❌ الرجاء إدخال تاريخ الجلسة"); return; }
            if(!caseObj.sessions) caseObj.sessions = [];
            caseObj.sessions.push({ id: Date.now(), date: sessionDate, notes: document.getElementById('sessionNotes').value });
            caseObj.sessions.sort((a,b) => new Date(a.date) - new Date(b.date));
            saveAll();
            renderCases();
            addNotification(`✅ تم إضافة جلسة للقضية ${caseObj.caseNumber}`);
            alert("✅ تم إضافة الجلسة!");
            document.getElementById('addSessionModal').remove();
        };
        document.getElementById('cancelSessionBtn').onclick = () => document.getElementById('addSessionModal').remove();
    }

    function editSession(caseId, sessionId) {
        let caseObj = cases.find(c => c.id === caseId);
        let session = caseObj?.sessions?.find(s => s.id === sessionId);
        if(!session) return;
        let modalHtml = `<div id="editSessionModal" class="modal-overlay"><div class="modal-container"><h3><i class="fas fa-edit"></i> تعديل الجلسة - ${caseObj.caseNumber}</h3><label>📅 تاريخ الجلسة:</label><input type="date" id="sessionDate" value="${session.date}"><label>📝 ملاحظات:</label><textarea id="sessionNotes" rows="3">${session.notes || ''}</textarea><div class="modal-buttons"><button id="saveEditSessionBtn" style="background:#facc15;">💾 حفظ</button><button id="cancelEditSessionBtn" style="background:#e2e8f0;">❌ إلغاء</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('saveEditSessionBtn').onclick = () => {
            let newDate = document.getElementById('sessionDate').value;
            if(!newDate) { alert("❌ الرجاء إدخال تاريخ الجلسة"); return; }
            session.date = newDate;
            session.notes = document.getElementById('sessionNotes').value;
            caseObj.sessions.sort((a,b) => new Date(a.date) - new Date(b.date));
            saveAll();
            renderCases();
            addNotification(`✏️ تم تعديل جلسة للقضية ${caseObj.caseNumber}`);
            alert("✅ تم تعديل الجلسة!");
            document.getElementById('editSessionModal').remove();
        };
        document.getElementById('cancelEditSessionBtn').onclick = () => document.getElementById('editSessionModal').remove();
    }

    function deleteSession(caseId, sessionId) {
        if(confirm("⚠️ هل أنت متأكد من حذف هذه الجلسة؟")){
            let caseObj = cases.find(c => c.id === caseId);
            if(caseObj && caseObj.sessions) {
                caseObj.sessions = caseObj.sessions.filter(s => s.id !== sessionId);
                saveAll();
                renderCases();
                addNotification(`🗑️ تم حذف جلسة من القضية ${caseObj.caseNumber}`);
                alert("✅ تم حذف الجلسة!");
            }
        }
    }

    function getLastSessionDate(sessions) {
        if(!sessions || sessions.length === 0) return null;
        let sorted = [...sessions].sort((a,b) => new Date(b.date) - new Date(a.date));
        return sorted[0].date;
    }

    function uploadDocumentForCase(caseId, caseNumber) {
        let name = prompt("📄 اسم المستند:");
        if(!name) return;
        let fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.onchange = e => {
            let file = e.target.files[0];
            if(!file) return;
            let reader = new FileReader();
            reader.onload = ev => {
                documents.push({ id: Date.now(), name: name, caseId: caseId, date: new Date().toLocaleDateString('ar-EG'), dataUrl: ev.target.result });
                saveAll();
                renderCases();
                addNotification(`✅ تم رفع مستند "${name}" للقضية ${caseNumber}`);
                alert(`✅ تم رفع المستند بنجاح`);
            };
            reader.readAsDataURL(file);
        };
        fileInput.click();
    }

    function deleteDocument(docId) {
        if(confirm("⚠️ هل أنت متأكد من حذف هذا المستند؟")){
            documents = documents.filter(d => d.id !== docId);
            saveAll();
            renderCases();
            addNotification(`🗑️ تم حذف مستند`);
        }
    }

    function editCase(caseId) {
        let caseObj = cases.find(c => c.id === caseId);
        if(!caseObj) return;
        let modalHtml = `<div id="editCaseModal" class="modal-overlay"><div class="modal-container"><h3>✏️ تعديل القضية</h3><label>رقم القضية:</label><input type="text" id="editCaseNumber" value="${caseObj.caseNumber}"><label>المحكمة:</label><input type="text" id="editCourt" value="${caseObj.court || ''}"><label>الدائرة:</label><input type="text" id="editCircuit" value="${caseObj.circuit || ''}"><label>الموكل:</label><select id="editClientId">${clients.map(c => `<option value="${c.id}" ${c.id === caseObj.clientId ? 'selected' : ''}>${c.name}</option>`).join('')}</select><label>صفة الموكل:</label><input type="text" id="editClientTitle" value="${caseObj.clientTitle || ''}"><label>الخصم:</label><input type="text" id="editOpponent" value="${caseObj.opponent || ''}"><label>صفة الخصم:</label><input type="text" id="editOpponentTitle" value="${caseObj.opponentTitle || ''}"><label>الموضوع:</label><input type="text" id="editSubject" value="${caseObj.subject || ''}"><div class="modal-buttons"><button id="modalSaveBtn" style="background:#22c55e; color:white;">✅ حفظ</button><button id="modalCancelBtn" style="background:#e2e8f0;">❌ إلغاء</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('modalSaveBtn').onclick = () => {
            let newCaseNumber = document.getElementById('editCaseNumber').value.trim();
            if(!newCaseNumber) { alert("رقم القضية مطلوب"); return; }
            caseObj.caseNumber = newCaseNumber;
            caseObj.court = document.getElementById('editCourt').value;
            caseObj.circuit = document.getElementById('editCircuit').value;
            caseObj.clientId = parseInt(document.getElementById('editClientId').value);
            caseObj.clientTitle = document.getElementById('editClientTitle').value;
            caseObj.opponent = document.getElementById('editOpponent').value;
            caseObj.opponentTitle = document.getElementById('editOpponentTitle').value;
            caseObj.subject = document.getElementById('editSubject').value;
            saveAll();
            renderCases();
            addNotification(`✏️ تم تعديل القضية: ${newCaseNumber}`);
            alert("✅ تم تعديل القضية!");
            document.getElementById('editCaseModal').remove();
        };
        document.getElementById('modalCancelBtn').onclick = () => document.getElementById('editCaseModal').remove();
    }

    function editSubjectDetails(caseId) {
        let caseObj = cases.find(c => c.id === caseId);
        if(!caseObj) return;
        let modalHtml = `<div id="editSubjectModal" class="modal-overlay"><div class="modal-container"><h3>📝 تفاصيل الموضوع</h3><textarea id="subjectDetails" rows="8" placeholder="اكتب تفاصيل القضية...">${caseObj.subjectDetails || ''}</textarea><div class="modal-buttons"><button id="modalSaveBtn" style="background:#22c55e; color:white;">✅ حفظ</button><button id="modalCancelBtn" style="background:#e2e8f0;">❌ إلغاء</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('modalSaveBtn').onclick = () => {
            caseObj.subjectDetails = document.getElementById('subjectDetails').value;
            saveAll();
            renderCases();
            addNotification(`✏️ تم تعديل تفاصيل الموضوع للقضية ${caseObj.caseNumber}`);
            alert("✅ تم حفظ التفاصيل!");
            document.getElementById('editSubjectModal').remove();
        };
        document.getElementById('modalCancelBtn').onclick = () => document.getElementById('editSubjectModal').remove();
    }

    function renderCases() {
        let tbody = document.querySelector('#casesTable tbody');
        tbody.innerHTML = '';
        cases.forEach(c => {
            let client = clients.find(cl=>cl.id == c.clientId);
            let isExpanded = expandedCase === c.id;
            let sessions = c.sessions || [];
            let caseDocs = documents.filter(doc => doc.caseId === c.id);
            let lastSessionDate = getLastSessionDate(sessions);
            tbody.innerHTML += `<tr class="case-row" onclick="toggleCaseDetails(${c.id})"><td><i class="fas fa-chevron-${isExpanded ? 'down' : 'left'}"></i></td><td><strong>${c.caseNumber}</strong></td><td>${c.court ? c.court + (c.circuit ? ' - ' + c.circuit : '') : '--'}</td><td>${client?.name || 'محذوف'}${c.clientTitle ? `<div style="font-size:11px; color:#64748b;">${c.clientTitle}</div>` : ''}</td><td>${c.opponent || '--'}${c.opponentTitle ? `<div style="font-size:11px; color:#64748b;">${c.opponentTitle}</div>` : ''}</td><td>${c.subject || '--'}${lastSessionDate ? `<div><span class="last-session-badge">📅 آخر جلسة: ${new Date(lastSessionDate).toLocaleDateString('ar-EG')}</span></div>` : ''}</td><td class="action-buttons"><button class="btn-outline btn-sm" onclick="event.stopPropagation(); editCase(${c.id})" style="background:#facc15;"><i class="fas fa-edit"></i> تعديل</button><button class="btn-outline btn-sm" onclick="event.stopPropagation(); deleteCase(${c.id})" style="background:#ef4444; color:white;"><i class="fas fa-trash"></i> حذف</button></td></tr>`;
            if(isExpanded) {
                let sessionsHtml = `<tr class="expanded-row"><td colspan="6"><div class="expanded-content"><div class="subject-section"><div class="flex-between"><h4><i class="fas fa-align-right"></i> الموضوع</h4><button class="btn btn-sm" onclick="event.stopPropagation(); editSubjectDetails(${c.id})"><i class="fas fa-edit"></i> تعديل التفاصيل</button></div><div class="subject-content">${c.subjectDetails ? c.subjectDetails.replace(/\n/g, '<br>') : 'لا توجد تفاصيل'}</div></div><div class="sessions-section"><div class="flex-between"><h4><i class="fas fa-calendar-alt"></i> جدول الجلسات</h4><button class="btn btn-sm" onclick="event.stopPropagation(); addSession(${c.id})"><i class="fas fa-plus"></i> إضافة جلسة</button></div><div id="sessions-list-${c.id}">`;
                if(sessions.length === 0) sessionsHtml += `<p>لا توجد جلسات</p>`;
                else {
                    const today = new Date(); today.setHours(0,0,0,0);
                    sessions.forEach(session => {
                        const sessionDate = new Date(session.date); sessionDate.setHours(0,0,0,0);
                        const diffDays = Math.ceil((sessionDate - today) / (1000*60*60*24));
                        const isUrgent = (diffDays <= 2 && diffDays >= 0);
                        sessionsHtml += `<div class="session-item ${isUrgent ? 'urgent' : ''}"><div class="flex-start"><i class="fas fa-gavel"></i><span>📅 ${new Date(session.date).toLocaleDateString('ar-EG')}</span>${session.notes ? `<span>📝 ${session.notes}</span>` : ''}${diffDays===2?'<span class="badge badge-warning">🔔 بعد يومين</span>':''}${diffDays===1?'<span class="badge badge-warning">⚠️ غداً</span>':''}${diffDays===0?'<span class="badge badge-warning">🚨 اليوم</span>':''}</div><div class="flex-start"><button class="btn-outline btn-sm" onclick="event.stopPropagation(); editSession(${c.id}, ${session.id})"><i class="fas fa-edit"></i></button><button class="btn-outline btn-sm" onclick="event.stopPropagation(); deleteSession(${c.id}, ${session.id})" style="background:#ef4444; color:white;"><i class="fas fa-trash"></i></button></div></div>`;
                    });
                }
                sessionsHtml += `</div></div><div style="margin-top:20px; border-top:2px solid #e2e8f0; padding-top:20px;"><div class="flex-between"><h4><i class="fas fa-file-alt"></i> المستندات</h4><button class="btn btn-sm" onclick="event.stopPropagation(); uploadDocumentForCase(${c.id}, '${c.caseNumber}')"><i class="fas fa-upload"></i> رفع مستند</button></div><div id="docs-list-${c.id}">`;
                if(caseDocs.length === 0) sessionsHtml += `<p>لا توجد مستندات</p>`;
                else {
                    caseDocs.forEach(doc => {
                        sessionsHtml += `<div class="doc-item"><div class="flex-start"><i class="fas fa-file-pdf"></i><span><strong>${doc.name}</strong></span><span>${doc.date}</span></div><div class="flex-start"><a href="${doc.dataUrl}" download="${doc.name}" class="btn-outline btn-sm">📥 تحميل</a><button class="btn-outline btn-sm" onclick="event.stopPropagation(); deleteDocument(${doc.id})" style="background:#ef4444; color:white;"><i class="fas fa-trash"></i></button></div></div>`;
                    });
                }
                sessionsHtml += `</div></div></div></td></tr>`;
                tbody.innerHTML += sessionsHtml;
            }
        });
    }

    window.toggleCaseDetails = (caseId) => { expandedCase = expandedCase === caseId ? null : caseId; renderCases(); };

    function showAddClientModal() {
        let modalHtml = `<div id="addClientModal" class="modal-overlay"><div class="modal-container"><h3>➕ إضافة موكل جديد</h3><label>اسم الموكل:</label><input type="text" id="clientName"><label>النوع:</label><select id="clientType"><option value="individual">فرد</option><option value="company">شركة</option></select><label>رقم الهاتف:</label><input type="text" id="clientPhone"><label>الرقم الوطني:</label><input type="text" id="clientIdNumber"><div class="modal-buttons"><button id="saveClientBtn" style="background:#22c55e; color:white;">✅ إضافة</button><button id="closeClientBtn" style="background:#e2e8f0;">❌ إلغاء</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('saveClientBtn').onclick = () => {
            let name = document.getElementById('clientName').value.trim();
            if(!name) { alert("الاسم مطلوب"); return; }
            clients.push({ id: Date.now(), name, type: document.getElementById('clientType').value, phone: document.getElementById('clientPhone').value, idNumber: document.getElementById('clientIdNumber').value });
            saveAll();
            renderClients();
            addNotification(`✅ تم إضافة موكل: ${name}`);
            alert(`✅ تمت الإضافة!`);
            document.getElementById('addClientModal').remove();
        };
        document.getElementById('closeClientBtn').onclick = () => document.getElementById('addClientModal').remove();
    }

    function showAddCaseModal() {
        if(clients.length === 0) { alert("❌ لا يوجد موكلون!"); return; }
        let modalHtml = `<div id="customCaseModal" class="modal-overlay"><div class="modal-container"><h3>➕ إضافة قضية جديدة</h3><label>رقم القضية:</label><input type="text" id="modalCaseNumber"><label>المحكمة:</label><input type="text" id="modalCourt"><label>الدائرة:</label><input type="text" id="modalCircuit"><label>الموكل:</label><select id="modalClientSelect"><option value="">-- اختر --</option>${clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select><label>صفة الموكل:</label><input type="text" id="modalClientTitle"><label>الخصم:</label><input type="text" id="modalOpponent"><label>صفة الخصم:</label><input type="text" id="modalOpponentTitle"><label>الموضوع:</label><input type="text" id="modalSubject"><div class="modal-buttons"><button id="modalSubmitBtn" style="background:#facc15;">✅ إضافة</button><button id="modalCloseBtn" style="background:#e2e8f0;">❌ إلغاء</button></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('modalSubmitBtn').onclick = () => {
            let caseNumber = document.getElementById('modalCaseNumber').value.trim();
            let clientId = document.getElementById('modalClientSelect').value;
            if(!caseNumber) { alert("رقم القضية مطلوب"); return; }
            if(!clientId) { alert("اختر موكلاً"); return; }
            cases.push({ id: Date.now(), caseNumber, court: document.getElementById('modalCourt').value, circuit: document.getElementById('modalCircuit').value, clientId: parseInt(clientId), clientTitle: document.getElementById('modalClientTitle').value, opponent: document.getElementById('modalOpponent').value || "غير محدد", opponentTitle: document.getElementById('modalOpponentTitle').value, subject: document.getElementById('modalSubject').value, subjectDetails: "", sessions: [] });
            saveAll();
            renderCases();
            addNotification(`✅ تم إضافة قضية: ${caseNumber}`);
            alert(`✅ تمت الإضافة!`);
            document.getElementById('customCaseModal').remove();
        };
        document.getElementById('modalCloseBtn').onclick = () => document.getElementById('customCaseModal').remove();
    }

    window.deleteClient = (id) => {
        if(confirm("⚠️ حذف الموكل سيحذف قضاياه؟")){
            let clientCases = cases.filter(c => c.clientId === id);
            clientCases.forEach(c => { documents = documents.filter(d => d.caseId !== c.id); });
            cases = cases.filter(c => c.clientId !== id);
            clients = clients.filter(c => c.id !== id);
            saveAll();
            renderClients();
            renderCases();
            addNotification(`🗑️ تم حذف موكل`);
        }
    };
    
    window.deleteCase = (id) => {
        if(confirm("⚠️ حذف القضية سيحذف مستنداتها وجلساتها؟")){
            documents = documents.filter(d => d.caseId !== id);
            cases = cases.filter(c => c.id !== id);
            if(expandedCase === id) expandedCase = null;
            saveAll();
            renderCases();
            addNotification(`🗑️ تم حذف قضية`);
        }
    };

    function checkAndSendSessionReminders() {
        const today = new Date(); today.setHours(0,0,0,0);
        let newNotifications = [];
        cases.forEach(c => {
            if(c.sessions) {
                c.sessions.forEach(s => {
                    if(s.date) {
                        let diffDays = Math.ceil((new Date(s.date) - today) / (1000*60*60*24));
                        if(diffDays === 2 || diffDays === 1 || diffDays === 0) {
                            let key = `reminder_${c.id}_${s.id}_${diffDays}`;
                            if(!localStorage.getItem(key)) {
                                let text = diffDays === 2 ? "🔔 بعد يومين" : (diffDays === 1 ? "⚠️ غداً" : "🚨 اليوم");
                                newNotifications.push({ id: Date.now(), text: `⚖️ ${text} - جلسة ${c.caseNumber}\n📅 ${new Date(s.date).toLocaleDateString('ar-EG')}`, read: false, date: new Date().toLocaleString() });
                                localStorage.setItem(key, 'sent');
                            }
                        }
                    }
                });
            }
        });
        if(newNotifications.length) { notifications = [...newNotifications, ...notifications].slice(0,100); saveAll(); }
    }
    setInterval(checkAndSendSessionReminders, 3600000);
    setTimeout(checkAndSendSessionReminders, 1000);

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            item.classList.add('active');
            let tab = item.getAttribute('data-tab');
            document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
            document.getElementById(`${tab}Tab`).style.display = 'block';
            let titles = {dashboard:'لوحة التحكم', clients:'الموكلون', cases:'القضايا'};
            document.getElementById('pageTitle').innerText = titles[tab];
            if(tab==='clients') renderClients();
            if(tab==='cases') renderCases();
            if(tab==='dashboard') renderDashboard();
        });
    });
    
    document.getElementById('addClientBtn').onclick = showAddClientModal;
    document.getElementById('addCaseBtn').onclick = showAddCaseModal;
    document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('notifIcon').onclick = () => {
        let text = notifications.slice(0,20).map(n => `${n.read ? '📖' : '🆕'} ${n.text}`).join('\n\n');
        alert(`📢 الإشعارات:\n\n${text || 'لا توجد إشعارات'}`);
        notifications.forEach(n => n.read = true);
        saveAll();
    };

    window.addSession = addSession;
    window.editSession = editSession;
    window.deleteSession = deleteSession;
    window.editCase = editCase;
    window.editSubjectDetails = editSubjectDetails;
    window.uploadDocumentForCase = uploadDocumentForCase;
    window.deleteDocument = deleteDocument;

    renderDashboard();
    renderClients();
    renderCases();
    updateStatsAndNotifs();
</script>
</body>
</html>
